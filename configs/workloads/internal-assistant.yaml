id: internal-assistant
match:
  headers:
    x-rwd-workload: "internal-assistant"
policy:
  level: L1
  data_classification: D1
  allowed_llm_backends:
    - openai_primary
  allowed_models:
    - gpt-main
  allowed_mcp_backends: []
  allowed_tools: []
  require_user_id: true
  require_session_id: false
  max_prompt_chars: 20000
  max_output_chars: 12000
guards:
  input:
    heuristic_prompt_injection: true
  output:
    secret_redaction: true
  tools:
    require_tool_allowlist: true
    require_tool_schema_validation: false
actions:
  on_block:
    http_status: 403
    message: "Internal workload blocked by policy."
